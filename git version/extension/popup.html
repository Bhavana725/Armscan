<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial;
            width: 340px;
            padding: 12px;
            background: #0e0e0e;
            color: white;
        }

        h2 {
            margin: 0;
            color: #ff0055;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #ff0055;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .card {
            background: #1a1a1a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        .highlight {
            border: 1px solid #ff0055;
        }

        .small {
            font-size: 12px;
            color: #bbb;
        }

        .risk {
            font-weight: bold;
            margin-top: 8px;
        }

        #downloadBtn {
            background: #333;
            margin-top: 8px;
        }

        #result {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>Armos Scanner</h2>

<button id="scanBtn">Scan Page</button>

<div id="result"></div>

<button id="downloadBtn" style="display:none;">Download JSON</button>

<script src="popup.js"></script>

</body>
</html>
